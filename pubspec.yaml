name: rodizio_brinquedos_v3
description: Rodízio de Brinquedos 2.1 (rebuild v3)
publish_to: 'none'

version: 1.0.2+34

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  intl: ^0.19.0
  uuid: ^4.4.0

  image_picker: ^1.0.7
  image_cropper: ^9.1.0
  in_app_purchase: ^3.2.0

  drift: ^2.31.0
  drift_flutter: ^0.2.8
  sqlite3_flutter_libs: ^0.5.0
  path: ^1.9.0
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  drift_dev: ^2.31.0
  build_runner: ^2.4.10
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/splash.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon27.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/splash.png
  android: true
  ios: true
