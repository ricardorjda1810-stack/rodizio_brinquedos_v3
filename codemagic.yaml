workflows:
  production:
    name: Production
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: asc_rodizio_v3

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.rodiziobrinquedos.v3

    scripts:
      - name: Clean Flutter and iOS cache
        script: |
          flutter clean
          rm -rf ios/Pods
          rm -f ios/Podfile.lock
          rm -rf ios/Runner.xcworkspace
          rm -rf ~/Library/Developer/Xcode/DerivedData/* || true

      - name: Pub get
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Analyze
        script: flutter analyze

      - name: Test
        script: |
          if [ -d test ]; then
            flutter test
          else
            echo "No tests directory found. Skipping flutter test."
          fi

      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true