workflows:
  production:
    name: Production
    instance_type: mac_mini_m2

    # ✅ integrations fica no nível do workflow (não dentro de environment)
    integrations:
      app_store_connect: "asc_rodizio_v3"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.rodiziobrinquedos.v3
    scripts:
      - name: Clean
        script: flutter clean

      - name: Pub get
        script: flutter pub get

      - name: Analyze
        script: flutter analyze

      - name: Test
        script: |
          if [ -d test ]; then
            flutter test
          else
            echo "No tests directory found. Skipping flutter test."
          fi

      - name: Build Android AAB
        script: flutter build appbundle --release

      - name: Build iOS IPA
        script: flutter build ipa --release --export-method app-store

    artifacts:
      - build/app/outputs/**/*.aab
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
